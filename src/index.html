<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
<title>Electron Pi</title>
<script src="vendor/marked.min.js"></script>
<script src="vendor/katex/katex.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f2f5; height: 100vh; display: flex; flex-direction: column;
  color: #333; overflow: hidden;
}
.hidden { display: none !important; }

/* Setup */
#setup-view {
  max-width: 440px; margin: auto; padding: 40px 32px;
  background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
}
#setup-view h1 { font-size: 22px; margin-bottom: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #555; }
.form-group input {
  width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd;
  border-radius: 8px; outline: none; transition: border .2s;
}
.form-group input:focus { border-color: #4a90d9; }
.btn-primary {
  width: 100%; padding: 11px; font-size: 15px; font-weight: 600;
  background: #4a90d9; color: #fff; border: none; border-radius: 8px;
  cursor: pointer; transition: background .2s;
}
.btn-primary:hover { background: #357abd; }
.btn-primary:disabled { background: #aaa; cursor: not-allowed; }
.error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; }

/* Chat */
#chat-view { display: flex; flex-direction: column; height: 100vh; }
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: #fff; border-bottom: 1px solid #e8e8e8;
  -webkit-app-region: drag; flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 600; }
header .hint { font-size: 12px; color: #999; -webkit-app-region: no-drag; }
#messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex;
  flex-direction: column; gap: 12px;
}
.msg { max-width: 80%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: #4a90d9; color: #fff; }
.msg.assistant { align-self: flex-start; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.msg.assistant.streaming { border-left: 3px solid #4a90d9; }
.msg.assistant > * { max-width: 100%; box-sizing: border-box; }
.msg.assistant .assistant-text { overflow-wrap: break-word; word-break: break-word; }
.msg.assistant ul, .msg.assistant ol { padding-left: 20px; margin: 4px 0; max-width: 100%; }
.msg.assistant li { word-break: break-word; overflow-wrap: break-word; }
.msg.assistant p { margin: 4px 0; }
.msg.assistant pre { overflow-x: auto; }
.msg.assistant .math-block { overflow-x: auto; margin: 8px 0; }
.msg.error { align-self: center; background: #fef0f0; color: #e74c3c; font-size: 13px; border: 1px solid #fde2e2; }
.tool-block { margin: 4px 0 14px 0; border: 1px solid rgba(34,197,94,0.25); border-radius: 6px; overflow: hidden; font-size: 12px; }
.tool-block.error { border-color: rgba(248,113,113,0.45); }
.tool-header { padding: 6px 10px; background: rgba(34,197,94,0.04); display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.tool-header:hover { background: rgba(34,197,94,0.08); }
.tool-header::before { content: '▶'; font-size: 9px; color: #999; transition: transform .15s; flex-shrink: 0; }
.tool-header.expanded::before { transform: rotate(90deg); }
.tool-name { color: #16a34a; font-family: Menlo, monospace; font-weight: 600; font-size: 12px; flex-shrink: 0; }
.tool-block.error .tool-name { color: #f87171; }
.tool-args { color: #666; font-family: Menlo, monospace; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
.tool-duration { color: #999; font-size: 11px; font-family: Menlo, monospace; flex-shrink: 0; }
.tool-body { border-top: 1px solid rgba(34,197,94,0.2); }
.tool-body.hidden { display: none; }
.tool-args-full { margin: 0; padding: 8px 10px; background: #fafafa; font-size: 11px; font-family: Menlo, monospace; color: #555; white-space: pre-wrap; word-break: break-all; border-bottom: 1px solid #e8e8e8; }
.tool-result-inline { margin: 4px 8px 8px; padding: 8px; background: #f8f9fa; font-size: 11px; font-family: Menlo, monospace; white-space: pre-wrap; word-break: break-all; border-radius: 4px; }
.typing { align-self: flex-start; color: #999; font-size: 13px; padding: 8px 0; }
#input-area {
  display: flex; gap: 8px; padding: 12px 20px; background: #fff;
  border-top: 1px solid #e8e8e8; flex-shrink: 0;
}
#input-area input {
  flex: 1; padding: 10px 14px; font-size: 14px; border: 1px solid #ddd;
  border-radius: 8px; outline: none;
}
#input-area input:focus { border-color: #4a90d9; }
#input-area button {
  padding: 10px 20px; font-size: 14px; font-weight: 600;
  border: none; border-radius: 8px; cursor: pointer; transition: background .2s;
}
#btn-send { background: #4a90d9; color: #fff; }
#btn-send:hover { background: #357abd; }
#btn-send:disabled { background: #ccc; }
#btn-abort { background: #e74c3c; color: #fff; }
#btn-abort:hover { background: #c0392b; }

/* Modal */
#reconfig-modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.3); }
.modal-content { position: relative; background: #fff; border-radius: 12px; padding: 32px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,.15); }
.modal-content h2 { font-size: 18px; margin-bottom: 20px; }
.modal-content .btn-primary { margin-top: 8px; }
.modal-actions { display: flex; gap: 8px; margin-top: 16px; }
.modal-actions .btn-primary { flex: 1; }
#modal-cancel { flex: 1; padding: 11px; font-size: 14px; font-weight: 600; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; transition: background .2s; }
#modal-cancel:hover { background: #f5f5f5; }

/* UI extension modal */
#ui-modal { z-index: 200; }
.ui-option-list { list-style: none; max-height: 280px; overflow-y: auto; border: 1px solid #e8e8e8; border-radius: 8px; }
.ui-option-list li { padding: 8px 12px; cursor: pointer; font-size: 14px; }
.ui-option-list li:hover { background: #f0f7ff; }
.ui-option-list .group-label { font-weight: 600; color: #888; cursor: default; padding: 8px 12px 4px; }
.ui-option-list .group-label:hover { background: none; }
#ui-modal-msg { margin: 8px 0; font-size: 14px; }
.ui-btn-cancel { padding: 9px 18px; font-size: 13px; border: 1px solid #ddd; border-radius: 8px; background: #fff; cursor: pointer; }
.ui-btn-cancel:hover { background: #f5f5f5; }
.ui-btn-ok { padding: 9px 18px; font-size: 13px; border: none; border-radius: 8px; background: #4a90d9; color: #fff; cursor: pointer; }
.ui-btn-ok:hover { background: #357abd; }
/* Toast notify */
.ui-toast { position: fixed; bottom: 60px; right: 20px; padding: 8px 16px; border-radius: 8px; font-size: 13px; color: #fff; z-index: 300; animation: uiToastIn .2s ease; pointer-events: none; }
.ui-toast.info { background: #333; }
.ui-toast.warning { background: #d97706; }
.ui-toast.error { background: #dc2626; }
@keyframes uiToastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>
<link rel="stylesheet" href="vendor/katex/katex.min.css">
</head>
<body>

<div id="setup-view">
  <h1>初次配置</h1>
  <div class="form-group">
    <label>API Key</label>
    <input id="input-api-key" type="password" placeholder="sk-...">
  </div>
  <div class="form-group">
    <label>Provider</label>
    <input id="input-provider" value="deepseek">
  </div>
  <div class="form-group">
    <label>Model</label>
    <input id="input-model" value="deepseek-v4-flash">
  </div>
  <div class="form-group">
    <label>工作目录 (cwd)</label>
    <input id="input-cwd" placeholder="~/project">
  </div>
  <div class="form-group">
    <label>HTTP Proxy</label>
    <input id="input-http-proxy" placeholder="http://127.0.0.1:7890">
  </div>
  <div class="form-group">
    <label>Windmill URL</label>
    <input id="input-windmill-url" value="http://ape:3900">
  </div>
  <div class="form-group">
    <label>Windmill Token</label>
    <input id="input-windmill-token" type="password" placeholder="wm_token_...">
  </div>
  <button class="btn-primary" id="btn-save-config">保存并开始</button>
  <div id="setup-error" class="error-msg"></div>
</div>

<div id="chat-view" class="hidden">
  <header>
    <h1>Electron Pi</h1>
    <span class="hint">
      <span id="session-status">就绪</span>
      <button id="btn-reconfigure" style="background:none;border:none;color:#4a90d9;cursor:pointer;margin-left:12px;font-size:12px;padding:0;">重新配置</button>
    </span>
  </header>
  <div id="messages"></div>
  <div id="input-area">
    <input id="chat-input" type="text" placeholder="输入消息..." disabled>
    <button id="btn-send" disabled>发送</button>
    <button id="btn-abort" class="hidden">中止</button>
  </div>

  <!-- Reconfig Modal -->
  <div id="reconfig-modal" class="hidden">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-content">
      <h2>重新配置</h2>
      <div class="form-group">
        <label>API Key</label>
        <input id="modal-api-key" type="password" placeholder="sk-...">
      </div>
      <div class="form-group">
        <label>Provider</label>
        <input id="modal-provider" value="deepseek">
      </div>
      <div class="form-group">
        <label>Model</label>
        <input id="modal-model" value="deepseek-v4-flash">
      </div>
      <div class="form-group">
        <label>工作目录 (cwd)</label>
        <input id="modal-cwd" placeholder="~/project">
      </div>
      <div class="form-group">
        <label>HTTP Proxy</label>
        <input id="modal-http-proxy" placeholder="http://127.0.0.1:7890">
      </div>
      <div class="form-group">
        <label>Windmill URL</label>
        <input id="modal-windmill-url" value="http://ape:3900">
      </div>
      <div class="form-group">
        <label>Windmill Token</label>
        <input id="modal-windmill-token" type="password" placeholder="wm_token_...">
      </div>
      <div class="modal-actions">
        <button class="btn-primary" id="modal-save">保存并重连</button>
        <button id="modal-cancel">取消</button>
      </div>
      <div id="modal-error" class="error-msg"></div>
    </div>
  </div>

  <!-- UI Select / Confirm Modal (for extension commands like /commands) -->
  <div id="ui-modal" class="hidden">
    <div class="modal-backdrop" id="ui-modal-backdrop"></div>
    <div class="modal-content">
      <h2 id="ui-modal-title"></h2>
      <div id="ui-modal-body"></div>
      <div class="modal-actions" id="ui-modal-actions"></div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id)
const setupView = $('setup-view')
const chatView = $('chat-view')
const messagesEl = $('messages')
const chatInput = $('chat-input')
const btnSend = $('btn-send')
const btnAbort = $('btn-abort')
const sessionStatus = $('session-status')

let streaming = false
let streamingMsgEl = null
let streamingTextEl = null
let toolBlocks = null
let unsubscribe = null

marked.use({
  extensions: [
    {
      name: 'inlineMath',
      level: 'inline',
      start(src) {
        const a = src.indexOf('$'), b = src.indexOf('\\(');
        if (a === -1 && b === -1) return -1;
        return Math.min(a === -1 ? Infinity : a, b === -1 ? Infinity : b);
      },
      tokenizer(src) {
        const m1 = src.match(/^\$([^$\n]+?)\$/);
        if (m1) return { type: 'inlineMath', raw: m1[0], text: m1[1] };
        const m2 = src.match(/^\\\(([\s\S]+?)\\\)/);
        if (m2) return { type: 'inlineMath', raw: m2[0], text: m2[1] };
      },
      renderer(token) {
        try {
          return katex.renderToString(token.text, { throwOnError: false });
        } catch {
          return token.raw;
        }
      }
    },
    {
      name: 'blockMath',
      level: 'block',
      start(src) {
        const a = src.indexOf('$$'), b = src.indexOf('\\[');
        if (a === -1 && b === -1) return -1;
        return Math.min(a === -1 ? Infinity : a, b === -1 ? Infinity : b);
      },
      tokenizer(src) {
        const m1 = src.match(/^\$\$([\s\S]+?)\$\$/);
        if (m1) return { type: 'blockMath', raw: m1[0], text: m1[1].trim() };
        const m2 = src.match(/^\\\[([\s\S]+?)\\\]/);
        if (m2) return { type: 'blockMath', raw: m2[0], text: m2[1].trim() };
      },
      renderer(token) {
        try {
          return '<div class="math-block">' +
            katex.renderToString(token.text, { displayMode: true, throwOnError: false }) +
            '</div>';
        } catch {
          return token.raw;
        }
      }
    }
  ]
});

function addMessage(role, text, extra) {
  const el = document.createElement('div')
  el.className = 'msg ' + role + (extra?.cls || '')
  if (extra?.streaming) {
    streamingMsgEl = el
    streamingTextEl = document.createElement('div')
    el.appendChild(streamingTextEl)
  } else {
    el.innerHTML = marked.parse(text, { breaks: true, gfm: true })
  }
  messagesEl.appendChild(el)
  scrollToBottomIfNeeded(true)
  return el
}

function updateStreamingMessage(text) {
  if (streamingTextEl) {
    streamingTextEl.innerHTML = marked.parse(text, { breaks: true, gfm: true })
    scrollToBottomIfNeeded()
  }
}

function finalizeStreaming() {
  if (streamingMsgEl) {
    streamingMsgEl.classList.remove('streaming')
    streamingMsgEl = null
    streamingTextEl = null
  }
}

function isNearBottom(threshold) {
  return messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < (threshold || 100)
}

function scrollToBottomIfNeeded(force) {
  if (force || isNearBottom()) {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: 'smooth' })
  }
}

function appendToolCall(toolCallId, toolName, args) {
  if (!streamingMsgEl) return
  if (!toolBlocks) toolBlocks = new Map()

  const container = document.createElement('div')
  container.className = 'tool-block'

  const header = document.createElement('div')
  header.className = 'tool-header'

  const nameEl = document.createElement('span')
  nameEl.className = 'tool-name'
  nameEl.textContent = toolName || 'tool'

  const argsEl = document.createElement('span')
  argsEl.className = 'tool-args'
  argsEl.textContent = previewArgs(args)

  const durationEl = document.createElement('span')
  durationEl.className = 'tool-duration'

  header.append(nameEl, argsEl, durationEl)
  header.addEventListener('click', () => {
    header.classList.toggle('expanded')
    body.classList.toggle('hidden')
  })
  container.appendChild(header)

  const body = document.createElement('div')
  body.className = 'tool-body hidden'

  const argsPre = document.createElement('pre')
  argsPre.className = 'tool-args-full'
  argsPre.textContent = JSON.stringify(args, null, 2)
  body.appendChild(argsPre)

  const resultEl = document.createElement('div')
  resultEl.className = 'tool-result-container'
  body.appendChild(resultEl)

  container.appendChild(body)
  streamingMsgEl.insertBefore(container, streamingTextEl)

  toolBlocks.set(toolCallId, {
    container, header, body, resultEl, durationEl,
    startTime: Date.now(),
    args,
  })
  scrollToBottomIfNeeded()
}

function previewArgs(args) {
  if (!args || typeof args !== 'object') return ''
  if (typeof args.command === 'string') return args.command.slice(0, 100)
  if (typeof args.path === 'string') return args.path
  if (typeof args.file_path === 'string') return args.file_path
  if (typeof args.pattern === 'string') return args.pattern
  if (typeof args.query === 'string') return args.query
  return JSON.stringify(args).slice(0, 100)
}

function updateToolResult(toolCallId, partialResult) {
  const block = toolBlocks?.get(toolCallId)
  if (!block) return
  block.resultEl.innerHTML = ''
  const text = extractText({ content: partialResult?.content || [] })
  const pre = document.createElement('pre')
  pre.className = 'tool-result-inline'
  pre.textContent = text || '(执行中...)'
  block.resultEl.appendChild(pre)
  scrollToBottomIfNeeded()
}

function finalizeToolResult(toolCallId, result, isError) {
  const block = toolBlocks?.get(toolCallId)
  if (!block) return
  const duration = ((Date.now() - block.startTime) / 1000).toFixed(1)
  block.durationEl.textContent = duration + 's'
  if (isError) block.container.classList.add('error')
  block.resultEl.innerHTML = ''
  const text = extractText({ content: result?.content || [] })
  const pre = document.createElement('pre')
  pre.className = 'tool-result-inline'
  if (text) {
    pre.textContent = text
  } else {
    pre.textContent = '(无输出)'
    pre.style.fontStyle = 'italic'
    pre.style.opacity = '0.6'
  }
  block.resultEl.appendChild(pre)
  scrollToBottomIfNeeded()
}

function setStreamingState(active) {
  streaming = active
  chatInput.disabled = active
  btnSend.disabled = active
  btnSend.classList.toggle('hidden', active)
  btnAbort.classList.toggle('hidden', !active)
  sessionStatus.textContent = active ? 'AI 回复中...' : '就绪'
}

function extractText(msg) {
  if (typeof msg.content === 'string') return msg.content
  if (Array.isArray(msg.content)) {
    return msg.content
      .filter(b => b.type === 'text')
      .map(b => b.text)
      .join('\n')
  }
  return ''
}

async function init() {
  try {
    const config = await window.pi.getConfig()
    if (config && config.apiKey && config.cwd) {
      await switchToChat(config)
      return
    }
    if (config) {
      $('input-api-key').value = config.apiKey || ''
      $('input-provider').value = config.provider || 'deepseek'
      $('input-model').value = config.model || 'deepseek-v4-flash'
      $('input-cwd').value = config.cwd || ''
      $('input-http-proxy').value = config.httpProxy || ''
      $('input-windmill-url').value = config.windmillUrl || 'http://ape:3900'
      $('input-windmill-token').value = config.windmillToken || ''
    }
  } catch (err) {
    console.error('init failed:', err)
  }
}

$('btn-save-config').addEventListener('click', async () => {
  const config = {
    provider: $('input-provider').value.trim(),
    model: $('input-model').value.trim(),
    apiKey: $('input-api-key').value.trim(),
    cwd: $('input-cwd').value.trim() || $('input-cwd').placeholder,
    httpProxy: $('input-http-proxy').value.trim(),
    windmillUrl: $('input-windmill-url').value.trim() || 'http://ape:3900',
    windmillToken: $('input-windmill-token').value.trim(),
  }
  if (!config.apiKey) {
    $('setup-error').textContent = '请输入 API Key'
    return
  }
  if (!config.cwd) {
    $('setup-error').textContent = '请输入工作目录'
    return
  }
  $('setup-error').textContent = ''
  $('btn-save-config').disabled = true
  $('btn-save-config').textContent = '保存中...'
  try {
    await window.pi.saveConfig(config)
    await switchToChat(config)
    $('btn-save-config').textContent = '保存并开始'
  } catch (err) {
    $('setup-error').textContent = '操作失败: ' + (err.message || err)
    $('btn-save-config').disabled = false
    $('btn-save-config').textContent = '保存并开始'
  }
})

async function switchToChat(config) {
  setupView.classList.add('hidden')
  chatView.classList.remove('hidden')
  sessionStatus.textContent = '正在连接...'
  let result
  try {
    result = await window.pi.createSession(config)
  } catch (err) {
    addMessage('error', '连接失败: ' + (err.message || err))
    sessionStatus.textContent = '连接失败'
    return
  }
  if (!result.ok) {
    addMessage('error', '连接失败: ' + result.error)
    sessionStatus.textContent = '连接失败'
    return
  }
  sessionStatus.textContent = '就绪'
  chatInput.disabled = false
  btnSend.disabled = false
  chatInput.focus()

  unsubscribe = window.pi.onEvent((event) => {
    switch (event.type) {
      case 'agent_session_ready':
        sessionStatus.textContent = '就绪'
        break
      case 'agent_start':
        setStreamingState(true)
        toolBlocks = new Map()
        break
      case 'agent_end':
        setStreamingState(false)
        finalizeStreaming()
        toolBlocks = null
        break
      case 'message_start': {
        if (event.message?.role === 'user') break
        if (!streamingMsgEl) {
          addMessage('assistant', '', { cls: ' streaming', streaming: true })
        }
        break
      }
      case 'message_update': {
        if (event.message?.role !== 'assistant') break
        const text = extractText(event.message || event)
        if (text) updateStreamingMessage(text)
        break
      }
      case 'message_end': {
        if (event.message?.role === 'user') break
        if (event.message?.role === 'toolResult') break
        const text = extractText(event.message || event)
        if (text) updateStreamingMessage(text)
        break
      }
      case 'tool_execution_start':
        appendToolCall(event.toolCallId, event.toolName, event.args)
        break
      case 'tool_execution_update':
        updateToolResult(event.toolCallId, event.partialResult)
        break
      case 'tool_execution_end':
        finalizeToolResult(event.toolCallId, event.result, event.isError)
        break
      case 'prompt_error':
        addMessage('error', '错误: ' + (event.errorMessage || '未知错误'))
        setStreamingState(false)
        finalizeStreaming()
        break
      case 'ui:select':
        showSelectModal(event.id, event.title, event.options)
        break
      case 'ui:confirm':
        showConfirmModal(event.id, event.title, event.message)
        break
      case 'ui:notify':
        showNotify(event.message, event.notifyType)
        break
      case 'ui:clear':
        messagesEl.innerHTML = ''
        break
    }
  })
}

function showSetup() {
  setupView.classList.remove('hidden')
  chatView.classList.add('hidden')
  if (unsubscribe) { unsubscribe(); unsubscribe = null }
  $('btn-save-config').disabled = false
  $('btn-save-config').textContent = '保存并开始'
}

// --- Extension UI: select / confirm / notify ---

function showSelectModal(id, title, options) {
  currentUIRequestId = id
  $('ui-modal-title').textContent = title
  const body = $('ui-modal-body')
  const actions = $('ui-modal-actions')
  body.innerHTML = ''
  actions.innerHTML = ''

  const ul = document.createElement('ul')
  ul.className = 'ui-option-list'
  let selectedValue = undefined

  for (const opt of options) {
    const li = document.createElement('li')
    li.textContent = opt
    if (opt.startsWith('---')) {
      li.className = 'group-label'
    } else {
      li.addEventListener('click', () => {
        selectedValue = opt
        closeUIModal()
        window.pi.sendUIResponse({ id, value: opt })
      })
    }
    ul.appendChild(li)
  }
  body.appendChild(ul)

  const cancelBtn = document.createElement('button')
  cancelBtn.className = 'ui-btn-cancel'
  cancelBtn.textContent = '取消'
  cancelBtn.addEventListener('click', () => {
    closeUIModal()
    window.pi.sendUIResponse({ id, value: undefined })
  })
  actions.appendChild(cancelBtn)

  $('ui-modal').classList.remove('hidden')
}

function showConfirmModal(id, title, message) {
  currentUIRequestId = id
  $('ui-modal-title').textContent = title
  const body = $('ui-modal-body')
  const actions = $('ui-modal-actions')
  body.innerHTML = ''
  actions.innerHTML = ''

  const msg = document.createElement('div')
  msg.id = 'ui-modal-msg'
  msg.textContent = message
  body.appendChild(msg)

  const cancelBtn = document.createElement('button')
  cancelBtn.className = 'ui-btn-cancel'
  cancelBtn.textContent = '取消'
  cancelBtn.addEventListener('click', () => {
    closeUIModal()
    window.pi.sendUIResponse({ id, value: false })
  })

  const okBtn = document.createElement('button')
  okBtn.className = 'ui-btn-ok'
  okBtn.textContent = '确定'
  okBtn.addEventListener('click', () => {
    closeUIModal()
    window.pi.sendUIResponse({ id, value: true })
  })

  actions.appendChild(cancelBtn)
  actions.appendChild(okBtn)
  $('ui-modal').classList.remove('hidden')
}

function closeUIModal() {
  currentUIRequestId = null
  $('ui-modal').classList.add('hidden')
}

function showNotify(message, type) {
  const existing = document.querySelector('.ui-toast')
  if (existing) existing.remove()
  const toast = document.createElement('div')
  toast.className = 'ui-toast ' + (type || 'info')
  toast.textContent = message
  document.body.appendChild(toast)
  setTimeout(() => { toast.remove() }, 3000)
}

let currentUIRequestId = null

$('ui-modal-backdrop').addEventListener('click', () => {
  if (currentUIRequestId !== null) {
    window.pi.sendUIResponse({ id: currentUIRequestId, value: undefined })
    currentUIRequestId = null
  }
  closeUIModal()
})

btnSend.addEventListener('click', sendMessage)
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) sendMessage()
})

async function sendMessage() {
  const text = chatInput.value.trim()
  if (!text || streaming) return
  chatInput.value = ''
  addMessage('user', text)
  try {
    await window.pi.sendMessage(text)
  } catch (err) {
    addMessage('error', '发送失败: ' + (err.message || err))
  }
}

btnAbort.addEventListener('click', async () => {
  await window.pi.abort()
  setStreamingState(false)
  finalizeStreaming()
})

$('btn-reconfigure').addEventListener('click', async () => {
  const config = await window.pi.getConfig()
  $('modal-api-key').value = config?.apiKey || ''
  $('modal-provider').value = config?.provider || 'deepseek'
  $('modal-model').value = config?.model || 'deepseek-v4-flash'
  $('modal-cwd').value = config?.cwd || ''
  $('modal-http-proxy').value = config?.httpProxy || ''
  $('modal-windmill-url').value = config?.windmillUrl || 'http://ape:3900'
  $('modal-windmill-token').value = config?.windmillToken || ''
  $('modal-error').textContent = ''
  $('reconfig-modal').classList.remove('hidden')
  $('modal-api-key').focus()
})

function closeModal() {
  $('reconfig-modal').classList.add('hidden')
}

$('modal-save').addEventListener('click', async () => {
  const config = {
    provider: $('modal-provider').value.trim(),
    model: $('modal-model').value.trim(),
    apiKey: $('modal-api-key').value.trim(),
    cwd: $('modal-cwd').value.trim() || $('modal-cwd').placeholder,
    httpProxy: $('modal-http-proxy').value.trim(),
    windmillUrl: $('modal-windmill-url').value.trim() || 'http://ape:3900',
    windmillToken: $('modal-windmill-token').value.trim(),
  }
  if (!config.apiKey) {
    $('modal-error').textContent = '请输入 API Key'
    return
  }
  if (!config.cwd) {
    $('modal-error').textContent = '请输入工作目录'
    return
  }
  $('modal-error').textContent = ''
  $('modal-save').disabled = true
  $('modal-save').textContent = '保存中...'
  try {
    await window.pi.abort()
    await window.pi.saveConfig(config)
    closeModal()
    await switchToChat(config)
  } catch (err) {
    $('modal-error').textContent = '操作失败: ' + (err.message || err)
  }
  $('modal-save').disabled = false
  $('modal-save').textContent = '保存并重连'
})

$('modal-cancel').addEventListener('click', closeModal)
$('modal-backdrop').addEventListener('click', closeModal)

init()
</script>
</body>
</html>
